name: daily-shorts

on:
  schedule:
    # GitHub Actionsのcronは UTC。毎時:00は世界中のcronが集中して
    # 遅延・スキップされやすいので、分を:00から外してバラけさせている。
    - cron: "17 20 * * *"   # JST 5:17ごろ
    - cron: "23 2 * * *"    # JST 11:23ごろ
    - cron: "19 8 * * *"    # JST 17:19ごろ
    - cron: "37 14 * * *"   # JST 23:37ごろ
  workflow_dispatch: {}   # 手動でも実行できるようにする（テスト用）

permissions:
  contents: write          # 被り防止ログのコミットに必要

concurrency:
  group: daily-shorts      # 多重実行を防ぐ
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg / ImageMagick / fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk wget
          sudo mkdir -p /usr/share/fonts/truetype/custom
          sudo wget -q -O /usr/share/fonts/truetype/custom/RocknRollOne-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/rocknrollone/RocknRollOne-Regular.ttf"
          sudo wget -q -O /usr/share/fonts/truetype/custom/MochiyPopOne-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/mochiypopone/MochiyPopOne-Regular.ttf"
          sudo fc-cache -f
          # ImageMagickのパス制限を解除（MoviePyのTextClip用）。IM6/IM7どちらでも対応。
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Generate and upload
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          GEN_TYPE: "ミックス"     # ミックス / スカッと / 意味怖
          PRIVACY:  "public"       # 最初は unlisted で試すのも手
        run: python generate_and_upload.py

      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_log.json
          git commit -m "update dedup log [skip ci]" || echo "no changes to commit"
          git pull --rebase origin main
          git push
