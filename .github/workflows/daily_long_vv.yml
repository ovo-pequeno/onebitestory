name: daily-long-story-vv

on:
  schedule:
    # VOICEVOX版・聞き流し長尺。1日1本。JST 翌4:41ごろ（:00回避）。
    - cron: "41 19 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-long-story-vv
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Start VOICEVOX engine (Docker)
        run: |
          docker run -d --name voicevox -p 50021:50021 voicevox/voicevox_engine:cpu-latest
          echo "VOICEVOXコンテナ起動。Python側でreadyを待ちます。"

      - name: Install system deps (ffmpeg / ImageMagick / fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Generate and upload (long story / VOICEVOX)
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PRIVACY: "unlisted"   # 最初は限定公開で声を確認。OKなら public に
        run: python generate_long_story_vv.py

      - name: Stop VOICEVOX engine
        if: always()
        run: docker rm -f voicevox || true

      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add long_used_log.json
          git commit -m "update long story vv dedup log [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push
