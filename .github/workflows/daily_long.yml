name: daily-long-story

on:
  schedule:
    # # UTC 19時台 = JST 翌04時台。1日1本。:00を避けて混雑回避。
    # # （daily-shorts の各回とも分・時がずれるよう調整）
    # - cron: "41 19 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-long-story
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system deps (ffmpeg / ImageMagick / fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto-cjk wget
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>//' /etc/ImageMagick-7/policy.xml || true

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Generate and upload (long story)
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          # 同じチャンネルに上げるなら下3つはShortsと同じSecretでOK。
          # 別チャンネルにするなら、長尺チャンネル用のSecretを作って差し替える。
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          PRIVACY: "public"          # 最初は unlisted で試すのも手
          # BGM_PATH: "assets/bgm.mp3"   # 作業用BGMを使うならリポジトリに置いてコメント解除
          # BG_IMAGE: "assets/bg.png"    # 背景画像を使うなら同上
        run: python generate_long_story.py

      - name: Commit dedup log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add long_used_log.json
          git commit -m "update long dedup log [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push
